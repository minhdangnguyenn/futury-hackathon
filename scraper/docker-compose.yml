version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: viega_user
      POSTGRES_PASSWORD: vibe_password
      POSTGRES_DB: signalforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  scraper:
    build: .
    environment:
      - DB_HOST=db
      - DB_NAME=signalforge
      - DB_USER=viega_user
      - DB_PASS=vibe_password
    depends_on:
      - db
    # In a real app we'd use a cron, but for vibe coding, 
    # we'll just run it once. You can use 'restart: always' and a sleep() in python if you want it to loop.

volumes:
  postgres_data:
